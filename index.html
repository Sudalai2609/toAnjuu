<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To mon Cherrie 🎀</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <section class="main-page">
    <div class="card">
      <h1>fillerTitle</h1>
      <p class="subtitle">fillerSubtitle</p>

      <div class="counter" id="counter">Reason #1</div>

      <div class="reason-box show" id="reasonBox">
        filler1
      </div>

      <button class="reason-btn" onclick="nextReason()">
        Show Me Another Reason ❤
      </button>

      <div class="music-controls">
        <button id="musicBtn">▶ Play Our Song</button>
      </div>

      <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mpeg">
      </audio>

      <div class="secret" id="secretMessage">
        fillerSecret
      </div>

      <p class="bottom-text">fillerBottom</p>
    </div>
  </section>

  <section class="gallery-page">
    <h2>Our Favourite Moments</h2>

    <div class="photo-layout">
      <div class="photo big"><img src="photo1.png" alt=""></div>
      <div class="photo small top"><img src="photo2.png" alt=""></div>
      <div class="photo small middle"><img src="photo3.png" alt=""></div>
      <div class="photo small bottom"><img src="photo4.png" alt=""></div>
      <div class="photo wide"><img src="photo5.png" alt=""></div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
  </html>
